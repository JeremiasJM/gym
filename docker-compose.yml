services:
  # ── Backend API ─────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: cefide-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
      CORS_ORIGIN: ${CORS_ORIGIN}
      API_DOMAIN: ${API_DOMAIN}
      COM_SERVICE_URL_1: ${COM_SERVICE_URL_1}
      COM_SERVICE_URL_2: ${COM_SERVICE_URL_2}
      COM_PULSE_MS: ${COM_PULSE_MS}
      DEFAULT_CLASES_GRACIA: ${DEFAULT_CLASES_GRACIA}
      DEFAULT_DIA_VENCIMIENTO: ${DEFAULT_DIA_VENCIMIENTO}
    # Migraciones corren antes del start (requisito Fullmindtech)
    command: sh -c "npx prisma migrate deploy && node dist/main"
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.cefide-api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.cefide-api.entrypoints=websecure"
      - "traefik.http.routers.cefide-api.tls=true"
      - "traefik.http.routers.cefide-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cefide-api.service=cefide-api"
      - "traefik.http.services.cefide-api.loadbalancer.server.port=3000"

networks:
  dokploy-network:
    external: true
