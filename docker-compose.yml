services:
  postgres:
    image: postgres:16-alpine
    container_name: cefide-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cefide
      POSTGRES_PASSWORD: cefide_dev
      POSTGRES_DB: cefide
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: cefide-backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://cefide:cefide_dev@postgres:5432/cefide
    ports:
      - '3000:3000'
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
      - ./apps/backend/prisma:/app/apps/backend/prisma

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: cefide-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_TARGET: http://backend:3000
    ports:
      - '5173:5173'
    volumes:
      - ./apps/frontend/src:/app/apps/frontend/src
      - ./apps/frontend/index.html:/app/apps/frontend/index.html

volumes:
  pgdata:
